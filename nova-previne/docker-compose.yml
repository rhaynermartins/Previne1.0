services:
  db:
    image: postgres:17-alpine
    container_name: nova-previne-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nova_previne}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nova_previne_dev}
      POSTGRES_DB: ${POSTGRES_DB:-nova_previne}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    container_name: nova-previne-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-nova_previne}:${POSTGRES_PASSWORD:-nova_previne_dev}@db:5432/${POSTGRES_DB:-nova_previne}?schema=public"
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_CLINIC_NAME: ${NEXT_PUBLIC_CLINIC_NAME:-Clinica Odontologica Nova Previne}
    ports:
      - "3000:3000"
    command: >
      sh -c "npm run prisma:deploy &&
             npm run prisma:seed &&
             npm run dev"

volumes:
  postgres_data:
